# Site wide configuration
title: Kundan Kumar
locale: en_US
url: "https://kundan-kumarr.github.io"

# Jekyll configuration
# permalink: /:categories/:title/
permalink: /posts/:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge
sass:
  sass_dir: _sass
  style: compressed
gems:
  - jekyll-sitemap

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: false

# Analytics
analytics:
  provider: "google-universal" # false (default), "google", "google-universal", "custom"
  google:
    tracking_id: ""

# Pagination
pagination:
  enabled: true

related_blog_posts:
  enabled: true
  max_related: 5

# Site owner
owner:
  name: Kundan Kumar
  avatar: bio.jpg
  position: Ph.D. Candidate
  school: Iowa State University
  place: Ames, Iowa, US
  bio: "I am a PhD Candidate in Computer Science with a minor in Statistics at Iowa State University. My areas of interest include Reinforcement Learning, Machine Vision, and AI-Security."
  email: kkumar@iastate.edu
  disqus-shortname: kundan

  twitter: kundan7kumar #username
  facebook: #username
  # google:
  #   plus: ""
  #   analytics: ""
