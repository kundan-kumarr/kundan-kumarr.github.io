# Site wide configuration
title: Kundan Kumar
locale: en_US
url: "https://kundan-kumarr.github.io"

# Jekyll configuration
permalink: /posts/:year/:month/:day/:title/
markdown: kramdown
highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-sitemap

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: false

# Pagination
pagination:
  enabled: true

# Related posts (check if your theme/plugin supports this)
related_blog_posts:
  enabled: true
  max_related: 5

# Site owner
owner:
  name: Kundan Kumar
  avatar: bio.jpg
  position: Ph.D. Candidate
  school: Iowa State University
  place: Ames, Iowa, US
  bio: "I am a PhD Candidate in Computer Science with a minor in Statistics at Iowa State University. My areas of interest include Reinforcement Learning, Machine Vision, and AI-Security."
  email: kkumar@iastate.edu

  twitter: kundan7kumar
  googlescholar: "1zDpIJkAAAAJ"
  github: "kundan-kumarr"
  linkedin: "kundan-kumarr"
  medium: "https://kkresearch.medium.com/"
  youtube: "@AIAgentic-007"
  orcid: "0000-0002-3229-6649"

disqus:
  shortname: kundan

# Sidebar navigation
defaults:
  - scope:
      path: ""
      type: docs
    values:
      sidebar:
        nav: "notes"

# Collections (if using _docs)
collections:
  docs:
    output: true
    permalink: /:collection/:path/

include:
  - ".htaccess"
  - "_pages"
  - "files"

exclude:
  - "lib"
  - "config.rb"
  - "Capfile"
  - "config"
  - "log"
  - "Rakefile"
  - "Rakefile.rb"
  - "tmp"
  - "less"
  - "*.sublime-project"
  - "*.sublime-workspace"
  - "test"
  - "spec"
  - "Gruntfile.js"
  - "package.json"
  - "node_modules"
  - "Gemfile"
  - "Gemfile.lock"
  - "LICENSE"
  - "README.md"
