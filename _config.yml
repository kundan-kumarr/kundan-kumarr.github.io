# Navigation
# Collections
collections:
  projects:
    output: true
    permalink: /:collection/:path/

# Defaults for collections
defaults:
  # _projects
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true

# Sidebar navigation
defaults:
  # _docs
  - scope:
      path: ""
      type: docs
    values:
      sidebar:
        nav: "notes"
      
# Navigation

include:
  - ".htaccess"
  - "_pages"
  - "files"
exclude:
  - "lib"
  - "config.rb"
  - "Capfile"
  - "config"
  - "log"
  - "Rakefile"
  - "Rakefile.rb"
  - "tmp"
  - "less"
  - "*.sublime-project"
  - "*.sublime-workspace"
  - "test"
  - "spec"
  - "Gruntfile.js"
  - "package.json"
  - "node_modules"
  - "Gemfile"
  - "Gemfile.lock"
  - "LICENSE"
  - "README.md"
